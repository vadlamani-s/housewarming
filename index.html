<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grihapravesham Invitation</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            padding: 40px 20px;
            background: linear-gradient(rgba(255, 244, 230, 0.92), rgba(255, 244, 230, 0.92)), 
                        url('https://images.unsplash.com/photo-1609137144813-7d722efcb451?auto=format&fit=crop&q=80&w=1200');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            font-family: 'Georgia', 'Times New Roman', serif;
            color: #3e2723;
        }
        .invitation-card {
            max-width: 650px;
            margin: 0 auto;
            background-color: rgba(255, 255, 255, 0.97);
            border: 6px double #800020;
            outline: 3px solid #d4af37;
            padding: 40px 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.25);
            border-radius: 4px;
        }
        /* FIXED: Vibrant, self-contained festive banner that never shows up empty */
        .festive-hero-banner {
            width: 100%;
            height: 180px;
            background: radial-gradient(circle, #a30029 30%, #5c0016 100%); /* Rich traditional silk maroon */
            border: 3px double #d4af37; /* Royal gold frame */
            border-radius: 6px;
            margin-bottom: 25px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.4), 0 4px 10px rgba(0,0,0,0.15);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow: hidden;
        }
        /* Golden traditional motif background accents inside the banner */
        .festive-hero-banner::before {
            content: "🪷 ❀ 🪷 ❀ 🪷 ❀ 🪷 ❀ 🪷";
            font-size: 14pt;
            color: rgba(212, 175, 55, 0.3);
            position: absolute;
            top: 10px;
            letter-spacing: 4px;
        }
        .banner-icon {
            font-size: 42pt;
            margin-bottom: 5px;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
            animation: glow 2s infinite alternate;
        }
        .banner-text {
            color: #d4af37;
            font-size: 16pt;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 4px;
            text-shadow: 1px 2px 4px rgba(0,0,0,0.5);
        }
        @keyframes glow {
            0% { filter: drop-shadow(0 2px 4px rgba(255,234,0,0.5)); }
            100% { filter: drop-shadow(0 4px 12px rgba(255,61,0,0.8)); }
        }
        .toranam-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            padding: 0 10px;
        }
        .leaf {
            width: 0; height: 0;
            border-left: 12px solid transparent;
            border-right: 12px solid transparent;
            border-top: 28px solid #2e7d32;
            margin: 0 2px;
            position: relative;
        }
        .leaf::before {
            content: '';
            position: absolute;
            top: -38px; left: -10px;
            width: 20px; height: 20px;
            background-color: #ff9100;
            border-radius: 50%;
        }
        .lotus-separator {
            font-size: 24pt;
            color: #e91e63;
            margin: 15px 0;
        }
        .invocation {
            font-size: 13pt;
            font-style: italic;
            color: #800020;
            font-weight: bold;
            margin-bottom: 15px;
        }
        .greeting {
            font-size: 28pt;
            font-weight: bold;
            color: #d4af37;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin: 10px 0;
        }
        .invitation-text {
            font-size: 12.5pt;
            line-height: 1.7;
            color: #4e342e;
        }
        .highlight-box {
            border-top: 2px dashed #d4af37;
            border-bottom: 2px dashed #d4af37;
            padding: 25px 10px;
            margin: 25px auto;
            max-width: 90%;
            background-color: #fffdf9;
        }
        .event-title {
            font-size: 22pt;
            font-weight: bold;
            color: #800020;
            margin-bottom: 15px;
        }
        .details-table {
            width: 100%;
            max-width: 400px;
            margin: 0 auto;
            font-size: 13pt;
        }
        .details-table td { padding: 6px 8px; }
        .label-cell { text-align: right; font-weight: bold; color: #b8860b; width: 45%; }
        .value-cell { text-align: left; color: #3e2723; width: 55%; }
        .diya-container { display: flex; justify-content: center; gap: 40px; margin: 20px 0; }
        .diya { position: relative; width: 45px; height: 25px; background: linear-gradient(#b8860b, #8b6508); border-radius: 0 0 50px 50px; }
        .diya::before { content: ''; position: absolute; top: -18px; left: 15px; width: 15px; height: 22px; background: radial-gradient(#ffea00, #ff3d00); border-radius: 50%; }
        .venue-section { margin: 25px 0; font-size: 13pt; }
        .venue-label { font-weight: bold; color: #800020; font-size: 15pt; }
        .poetic-footer { font-size: 11.5pt; font-style: italic; color: #5d4037; line-height: 1.6; }
        .hosts-section { margin-top: 30px; border-top: 1px solid #f0e6df; padding-top: 20px; }
        .hosts-label { font-size: 10pt; text-transform: uppercase; color: #757575; }
        .hosts-names { font-size: 16pt; font-weight: bold; color: #800020; }
        .rsvp-section {
            margin-top: 40px;
            background-color: #fff9f2;
            border: 1px solid #d4af37;
            border-radius: 6px;
            padding: 25px;
            text-align: left;
        }
        .rsvp-title { font-size: 15pt; font-weight: bold; color: #800020; text-align: center; margin-bottom: 15px; border-bottom: 1px solid #e0d0c0; padding-bottom: 8px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #4e342e; }
